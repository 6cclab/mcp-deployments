apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homelab-mcp
rules:
  # Core K8s resources (read-only)
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - pods/log
      - namespaces
      - services
      - configmaps
      - events
      - persistentvolumeclaims
      - secrets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  # Scale + restart (patch for rollout restart and scaling)
  - apiGroups: ["apps"]
    resources:
      - deployments/scale
      - statefulsets/scale
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
    verbs: ["patch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]

  # RBAC introspection
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list"]

  # CRD discovery
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list"]

  # Traefik CRDs
  - apiGroups: ["traefik.io"]
    resources:
      - ingressroutes
      - ingressroutetcps
      - middlewares
      - tlsstores
    verbs: ["get", "list"]

  # Infisical CRDs
  - apiGroups: ["secrets.infisical.com"]
    resources:
      - infisicalsecrets
    verbs: ["get", "list"]

  # Argo Rollouts CRDs
  - apiGroups: ["argoproj.io"]
    resources:
      - rollouts
      - rollouts/status
      - analysisruns
      - analysistemplates
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources:
      - rollouts
    verbs: ["patch"]

  # GitHub Actions Runner CRDs
  - apiGroups: ["actions.summerwind.dev"]
    resources:
      - runners
      - runnerdeployments
      - horizontalrunnerautoscalers
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homelab-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homelab-mcp
subjects:
  - kind: ServiceAccount
    name: homelab-mcp
    namespace: mcp
